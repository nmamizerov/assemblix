name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Backend (assemblix-app-api) CI. The frontend has its own pipeline in web-ci.yml.
# A frontend-only PR skips the Python jobs but is still covered by the repo-wide
# gitleaks secret scan below.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assemblix-app-api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras --group dev
      - run: uv run ruff check assemblix_api/ tests/
      - run: uv run ruff format --check assemblix_api/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assemblix-app-api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras --group dev
      - run: uv run mypy assemblix_api/

  security:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assemblix-app-api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras --group dev
      - run: uv run bandit -c pyproject.toml -r assemblix_api/ -q

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml

  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assemblix-app-api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agent-flux
          POSTGRES_PASSWORD: agent-flux
          POSTGRES_DB: agent-flux
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent-flux -d agent-flux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://agent-flux:agent-flux@localhost:5432/agent-flux
      BILLING_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras --group dev
      # Generate ephemeral secrets so the app's fail-fast startup / token helpers
      # have valid values. Never commit real keys.
      - name: Generate runtime secrets
        run: |
          echo "JWT_SECRET_KEY=$(python3 -c 'import secrets;print(secrets.token_urlsafe(48))')" >> "$GITHUB_ENV"
          echo "ENCRYPTION_KEY=$(python3 -c 'from cryptography.fernet import Fernet;print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"
      - name: Apply migrations (smoke-check schema)
        run: uv run alembic upgrade head
      # The base suite (unit + integration) spins up its own throwaway Postgres
      # via testcontainers (Docker is available on GitHub-hosted runners); the
      # `external` marker (real provider keys) stays out of CI.
      - name: Base suite with coverage
        run: uv run pytest tests/unit tests/integration -m "not external" --cov --cov-report=term-missing --cov-report=xml
