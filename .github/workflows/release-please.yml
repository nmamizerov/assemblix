name: release-please

# Conventional-Commit driven releases. On every push to main, release-please
# maintains a "release PR" that bumps the version (root manifest +
# pyproject.toml + package.json in lockstep) and regenerates CHANGELOG.md.
# Merging that PR creates the vX.Y.Z git tag and the GitHub Release.
# See CONTRIBUTING.md → "Releases" for the workflow.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
