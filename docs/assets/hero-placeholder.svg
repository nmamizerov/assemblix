<svg width="860" height="480" viewBox="0 0 860 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Assemblix canvas demo placeholder">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#CBD5E1"/>
    </pattern>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- window -->
  <rect x="0.5" y="0.5" width="859" height="479" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="1" y="1" width="858" height="44" rx="16" fill="#FFFFFF"/>
  <rect x="1" y="30" width="858" height="15" fill="#FFFFFF"/>
  <circle cx="26" cy="23" r="6" fill="#F87171"/>
  <circle cx="48" cy="23" r="6" fill="#FBBF24"/>
  <circle cx="70" cy="23" r="6" fill="#34D399"/>
  <line x1="0" y1="45" x2="860" y2="45" stroke="#E2E8F0"/>

  <!-- canvas -->
  <rect x="1" y="46" width="858" height="433" fill="url(#dots)"/>

  <!-- edges -->
  <path d="M214 150 C 280 150, 300 235, 366 235" stroke="#94A3B8" stroke-width="3" fill="none"/>
  <path d="M560 235 C 620 235, 640 150, 700 150" stroke="#94A3B8" stroke-width="3" fill="none"/>
  <path d="M560 235 C 620 235, 640 330, 700 330" stroke="#94A3B8" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round" fill="none"/>

  <!-- START -->
  <g filter="url(#card)">
    <rect x="92" y="124" width="122" height="52" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <circle cx="116" cy="150" r="9" fill="#10B981"/>
  <text x="136" y="156" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#0F172A">START</text>

  <!-- AGENT -->
  <g filter="url(#card)">
    <rect x="366" y="200" width="194" height="70" rx="14" fill="#FFFFFF" stroke="#C7D2FE"/>
  </g>
  <rect x="366" y="200" width="6" height="70" rx="3" fill="#6366F1"/>
  <circle cx="398" cy="235" r="11" fill="#EEF2FF"/>
  <path d="M398 229 v12 M392 235 h12" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>
  <text x="420" y="230" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#0F172A">AI Agent</text>
  <text x="420" y="250" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#64748B">gpt-4o · tools</text>

  <!-- CONDITION -->
  <g filter="url(#card)">
    <rect x="700" y="124" width="122" height="52" rx="14" fill="#FFFFFF" stroke="#FDE68A"/>
  </g>
  <circle cx="724" cy="150" r="9" fill="#F59E0B"/>
  <text x="744" y="156" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#0F172A">IF / ELSE</text>

  <!-- END -->
  <g filter="url(#card)">
    <rect x="700" y="304" width="122" height="52" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <circle cx="724" cy="330" r="9" fill="#F43F5E"/>
  <text x="744" y="336" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#0F172A">END</text>

  <!-- play overlay -->
  <circle cx="430" cy="392" r="34" fill="#6366F1"/>
  <path d="M421 376 l24 16 l-24 16 z" fill="#FFFFFF"/>
  <text x="430" y="452" text-anchor="middle" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#475569">Build a workflow, then watch it run — live</text>
</svg>
