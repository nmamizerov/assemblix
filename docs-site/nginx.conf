# nginx config for the docs container. Serves the pre-built MkDocs site at the
# root; the web container proxies `/docs/` here (stripping the prefix), so all
# of MkDocs' relative asset/link URLs resolve correctly under app-host/docs.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # MkDocs uses directory-style URLs (…/getting-started/); fall back to the
    # per-directory index.html, then a real 404 page.
    location / {
        try_files $uri $uri/ =404;
    }
}
