# gitleaks configuration for the assemblix monorepo.
# Extends the upstream default ruleset and adds a narrow allowlist for files
# that legitimately contain secret-shaped — but non-secret — strings.
title = "assemblix gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Global allowlist for known non-secrets"
paths = [
  # Templates / examples with empty placeholders, not real secrets.
  '''.*\.env\.example.*$''',
  '''.*\.env\.sample$''',
  # Lockfiles contain hashes that can look like secrets.
  '''.*uv\.lock$''',
  '''.*package-lock\.json$''',
  '''.*pnpm-lock\.yaml$''',
  '''.*yarn\.lock$''',
  # Build artifacts (never tracked by git anyway).
  '''.*__pycache__.*''',
  '''.*\.pyc$''',
]
# Exact non-secret values: OAuth endpoint URLs, doc placeholders, and the
# deliberately-fake example/test API keys. Listed individually so a REAL leaked
# key is still detected.
regexes = [
  '''https://oauth2\.googleapis\.com/token''',
  '''https://github\.com/login/oauth/access_token''',
  # Doc placeholders
  '''YOUR_API_KEY''',
  '''YOUR_JWT_TOKEN''',
  # Sequential dummy key used in OpenAPI examples / DTO samples
  '''sk_a1b2c3d4e5f67890123456789abcdef0''',
  # Fixed fixture key used in workflow test docs/scenarios
  '''sk_5b5e29b909816a9d7d8eb5f6c2bf7d09''',
]
